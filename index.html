<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>LATINA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LATINA">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root{
    --bg:#0f1410; --card:#171f18; --card2:#1d271e; --green:#58cc02; --green-dark:#46a302;
    --text:#eef3ec; --dim:#8fa092; --red:#ff4b4b; --blue:#1cb0f6; --gold:#ffc800;
    --border:#26331f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text); margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding-bottom:env(safe-area-inset-bottom); overscroll-behavior:none;
  }
  #app{min-height:100vh; padding-top:env(safe-area-inset-top);}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:14px 16px;
    background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
  }
  .brand{font-weight:800; font-size:1.05rem; letter-spacing:0.5px;}
  .hud{display:flex; gap:12px;}
  .hud-item{font-size:0.9rem; font-weight:700; background:var(--card2); padding:4px 10px; border-radius:14px;}
  .back-btn{background:none; border:none; color:var(--text); font-size:1.3rem; cursor:pointer; padding:4px 10px;}
  .tabbar{display:flex; gap:8px; padding:10px 16px; background:var(--bg);}
  .tab-btn{flex:1; background:var(--card2); border:1px solid var(--border); color:var(--dim); padding:8px; border-radius:10px; font-size:0.82rem; font-weight:700;}
  .tab-btn.active{background:var(--green); color:#0a1a05; border-color:var(--green);}

  .path-container{padding:20px 16px 80px; display:flex; flex-direction:column; gap:14px;}
  .lesson-node{display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px 14px; cursor:pointer; transition:transform 0.1s;}
  .lesson-node:active{transform:scale(0.98);}
  .node-circle{
    width:54px; height:54px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    background:conic-gradient(var(--green) var(--prog), var(--card2) 0); position:relative;
  }
  .node-circle::before{content:''; position:absolute; width:44px; height:44px; border-radius:50%; background:var(--card);}
  .node-num{position:relative; font-weight:800; color:var(--green);}
  .node-info{flex:1; min-width:0;}
  .node-title{font-weight:700; font-size:0.92rem;}
  .node-sub{font-size:0.74rem; color:var(--dim); margin:2px 0 6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .node-bar{height:5px; background:var(--card2); border-radius:3px; overflow:hidden;}
  .node-bar i{display:block; height:100%; background:var(--green);}

  .lectio-title{padding:4px 16px 12px; color:var(--dim); font-size:0.88rem; font-weight:600;}
  .type-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px;}
  .type-card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 10px; text-align:center; cursor:pointer;}
  .type-card:active{transform:scale(0.97);}
  .type-icon{font-size:1.6rem; margin-bottom:6px;}
  .type-label{font-size:0.76rem; font-weight:700; line-height:1.25; min-height:32px;}
  .type-bar{height:4px; background:var(--card2); border-radius:2px; margin-top:8px; overflow:hidden;}
  .type-bar i{display:block; height:100%; background:var(--blue);}

  .btn-primary{
    background:var(--green); color:#0a1a05; border:none; border-radius:14px; padding:14px; font-size:0.95rem;
    font-weight:800; width:100%; margin-top:10px; cursor:pointer;
  }
  .btn-primary:disabled{opacity:0.5;}
  .btn-secondary{
    background:var(--card2); color:var(--text); border:1px solid var(--border); border-radius:14px; padding:12px;
    font-size:0.9rem; font-weight:700; width:100%; margin-top:8px; cursor:pointer;
  }

  .session-top{gap:10px;}
  .session-progress{flex:1; height:10px; background:var(--card2); border-radius:6px; overflow:hidden; margin-left:6px;}
  .session-progress i{display:block; height:100%; background:var(--green); transition:width 0.3s;}
  .session-body{padding:24px 18px; max-width:480px; margin:0 auto;}
  .q-prompt{font-size:1.02rem; font-weight:700; margin-bottom:16px; line-height:1.4;}
  .q-word{font-size:1.5rem; font-weight:800; color:var(--gold); text-align:center; margin:16px 0; font-style:italic;}
  .q-latin{font-size:1.05rem; font-style:italic; color:var(--gold); background:var(--card); padding:14px; border-radius:10px; margin-bottom:14px; line-height:1.5;}

  .syll-row{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:24px 0;}
  .syll-chip{
    background:var(--card2); border:2px solid var(--border); border-radius:10px; padding:10px 14px; font-size:1.1rem;
    font-weight:700; cursor:pointer; font-style:italic;
  }
  .syll-chip.correct-chip{border-color:var(--green); background:rgba(88,204,2,0.15); color:var(--green);}
  .syll-chip.wrong-chip{border-color:var(--red); background:rgba(255,75,75,0.15); color:var(--red);}

  .opt-list{display:flex; flex-direction:column; gap:10px;}
  .opt-btn{
    background:var(--card); border:2px solid var(--border); color:var(--text); border-radius:14px; padding:14px;
    font-size:0.88rem; text-align:left; cursor:pointer; line-height:1.35;
  }
  .opt-btn:active{transform:scale(0.99);}
  .opt-btn.correct-opt{border-color:var(--green); background:rgba(88,204,2,0.12); color:var(--green);}
  .opt-btn.wrong-opt{border-color:var(--red); background:rgba(255,75,75,0.12); color:var(--red);}

  .fill-input{
    width:100%; padding:14px; font-size:1rem; border-radius:12px; border:2px solid var(--border);
    background:var(--card); color:var(--text); margin:10px 0; font-style:italic;
  }
  .fill-input:focus{outline:none; border-color:var(--blue);}

  .flashcard{
    background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 18px; min-height:120px;
    display:flex; align-items:center; justify-content:center; text-align:center; margin-bottom:14px;
  }
  .flash-front{font-size:1.05rem; line-height:1.5;}
  .flash-back{font-size:1.05rem; font-style:italic; color:var(--gold); line-height:1.5; margin-top:14px; border-top:1px solid var(--border); padding-top:14px;}
  .self-rate{display:flex; gap:10px; margin-top:10px;}
  .rate-btn{flex:1; padding:14px; border-radius:14px; border:none; font-weight:700; font-size:0.85rem; cursor:pointer;}
  .rate-btn.bad{background:rgba(255,75,75,0.15); color:var(--red); border:2px solid var(--red);}
  .rate-btn.good{background:rgba(88,204,2,0.15); color:var(--green); border:2px solid var(--green);}

  .feedback{margin-top:18px;}
  .fb-box{padding:12px 14px; border-radius:12px; font-size:0.85rem; margin-bottom:10px; line-height:1.4;}
  .fb-good{background:rgba(88,204,2,0.15); color:var(--green); border:1px solid var(--green);}
  .fb-bad{background:rgba(255,75,75,0.15); color:var(--red); border:1px solid var(--red);}

  .results-screen{padding:60px 24px; text-align:center;}
  .results-emoji{font-size:4rem; margin-bottom:10px;}
  .xp-gain{color:var(--gold); font-weight:800; font-size:1.1rem;}

  .memory-stats{display:flex; gap:10px; padding:16px;}
  .mem-stat{flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center;}
  .mem-num{font-size:1.6rem; font-weight:800; color:var(--green);}
  .mem-lbl{font-size:0.72rem; color:var(--dim); margin-top:4px;}
  .boxes-row{display:flex; gap:6px; padding:0 16px 16px; overflow-x:auto;}
  .box-pill{flex:0 0 auto; background:var(--card2); border-radius:10px; padding:8px 12px; font-size:0.72rem; text-align:center; white-space:nowrap;}
  .mem-explain{padding:0 16px; font-size:0.8rem; color:var(--dim); line-height:1.5;}
  #reviewDueBtn{margin:16px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
